# Smithery listing config for mcp-flowgate.
#
# SCOPE: this declares the *stdio* launch form. It lets Smithery list
# mcp-flowgate and install it locally through the Smithery CLI.
#
# It does NOT configure Smithery's *hosted* container deployment. That
# path requires the server to speak MCP Streamable HTTP on a `/mcp`
# endpoint and listen on $PORT. mcp-flowgate currently serves over
# stdio only (`mcp-flowgate serve`), so hosted deployment would need an
# HTTP server transport added to the crate first. See docs/PUBLISHING.md.

startCommand:
    type: stdio
    configSchema:
        type: object
        required: ['configPath']
        properties:
            configPath:
                type: string
                description: Absolute path to the gateway YAML config file.
    commandFunction: |-
        (config) => ({
          command: 'mcp-flowgate',
          args: ['serve', '--config', config.configPath]
        })
    exampleConfig:
        configPath: /absolute/path/to/gateway.yaml
