[package]
name = "mcp-flowgate-tui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Flowgate governed agent runtime ‚Äî Aether agent framework routed through mcp-flowgate as its sole MCP server"

[dependencies]
# Aether agent framework ‚Äî full feature set
aether_cli = { version = "0.7", package = "aether-agent-cli" }
wisp = { version = "0.4", package = "aether-wisp" }
tui = { version = "0.2", package = "aether-tui", features = ["syntax"] }
aether_core = { version = "0.6", package = "aether-agent-core" }
# T19: `ReasoningEffort` is owned by aether-llm; we depend on it
# directly to translate `agents.yaml` per-provider feature toggles into
# the effective effort level aether's runtime takes.
llm = { version = "0.7", package = "aether-llm" }

# Note: no Cargo-level dependency on `mcp-flowgate`. The TUI spawns the
# mcp-flowgate binary as a child process at runtime; binary discovery is
# handled by `find_flowgate_binary` in src/flowgate_mcp.rs (sibling of
# current_exe, then PATH, then MCP_FLOWGATE_PATH env override).
# Adding a path-dep would be silently ignored anyway because mcp-flowgate
# is a binary-only crate (no `[lib]` target).

# Shared
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
crossterm = { version = "0.29", features = ["event-stream"] }
# SPEC ¬ß20.6 (audit recommendation) ‚Äî platform-standard cache/log dir
# resolution for the TUI's log output. See B.4 in the audit-resolution
# plan; replaces the previously hardcoded /tmp path.
dirs = "5"
tempfile.workspace = true
# SPEC ¬ß21 ‚Äî `async fn` in traits for the interpreter's `McpToolCaller`
# and `SubAgentSpawner` abstractions. Required so tests can substitute
# mocks without spinning up real MCP/LLM processes.
async-trait.workspace = true
thiserror.workspace = true

# SPEC ¬ß21 ‚Äî production `McpToolCaller` impl: rmcp client that talks to
# a `mcp-flowgate` child process over stdio. Same workspace dep + same
# feature set the executors crate uses for outbound MCP calls.
rmcp = { workspace = true }

# Tranche 3 (flowgate doctor) ‚Äî pre-flight checks call core's config
# resolver and parse YAML directly to surface resolve-time errors
# without spinning the runtime.
mcp-flowgate-core = { workspace = true }
serde_yaml = { workspace = true }

# T23: doctor's live-probe cache. chrono for timestamps in
# ~/.cache/flowgate/agents-last-probe.json; reqwest for the actual
# HTTP probe of provider /v1/models endpoints. `--refresh-agents`
# flag re-probes; default doctor runs read the cache + warn on stale.
chrono = { workspace = true }
reqwest = { workspace = true }

# Library surface: `interpreter`, `agent_config`, `tui_config`, `sub_agent`
# (see src/lib.rs). Integration tests import via `mcp_flowgate_tui::‚Ä¶`.
[lib]
name = "mcp_flowgate_tui"
path = "src/lib.rs"

[lints]
workspace = true

# SPEC ¬ßB.1 ‚Äî two `[[bin]]` entries pointing at the same source. `flowgate`
# is the primary alias users type; `flowgate-tui` is the discoverable
# long-form. The `fg` alias was deliberately NOT shipped ‚Äî it collides
# with the bash builtin for resuming backgrounded jobs.
[[bin]]
name = "flowgate"
path = "src/main.rs"

[[bin]]
name = "flowgate-tui"
path = "src/main.rs"

[dev-dependencies]
