schema: flowgate.repo/v1
name: cognitive-architectures
namespace: cognitive
version: 0.6.0
description: |
  The canonical first resource repo for the mcp-flowgate v0.6
  capability/orchestrator composition model (SPEC §9).

  Ships four lifecycle orchestrators (flow.*) and the capabilities
  (cap.*) they depend on. Operators reference this repo from their
  gateway config via:

      repos:
        - path: /path/to/cognitive-architectures

  Every loaded definitionId is namespace-prefixed `cognitive/<id>`
  (e.g. `cognitive/flow.add-feature`, `cognitive/cap.plan.vet`).

  Pre-v0.6 demo content lives under `workflows/`, `skills/`,
  `scripts-library/`, `agents/`, `patterns/`, and `examples/` — those
  trees stay outside this manifest's layout and continue to load via
  the legacy `include:` path so existing operators don't break on
  upgrade.

# Default layout (`capabilities/`, `orchestrators/`, `skills/`,
# `scripts/`, `connections/`) matches the field names, so we only
# need to override the ones that differ from the defaults. v0.6
# ships only capabilities and orchestrators through the repo
# manifest; the legacy `skills/` and `scripts-library/` trees stay
# outside the manifest until they're re-shaped for v0.7.
layout:
  capabilities:  capabilities
  orchestrators: orchestrators
  # v0.6 ships only capabilities and orchestrators through the manifest.
  # The legacy `skills/`, `scripts-library/`, and `connections/` trees
  # are NOT in the manifest's layout — they continue to load via the
  # pre-v0.6 `include:` path. We point these layout slots at sentinel
  # paths that don't exist so `load_repo` silently skips them.
  skills:        ._unused_v06_skills
  scripts:       ._unused_v06_scripts
  connections:   ._unused_v06_connections
