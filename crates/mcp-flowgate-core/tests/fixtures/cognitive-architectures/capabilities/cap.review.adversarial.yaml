# capabilities/cap.review.adversarial.yaml
#
# Adversarial code review of the candidate diff. Shared capability used
# by `flow.add-feature`, `flow.bugfix-from-error-log`, and
# `flow.safe-refactor` — exactly the kind of cross-orchestrator
# reuse the two-tier model exists to enable.

workflows:
  cap.review.adversarial:
    verb: review
    lifecycle: experimental
    description: >
      Adversarial review of the diff against the declared base ref;
      surface findings + an overall verdict.
    snippet:
      inputs:
        diff_against: { type: string, required: true }
      outputs:
        verdict:  { type: string, enum: [approved, needs-revision, rejected] }
        findings: { type: array }
    initialState: reviewed
    initialContext:
      verdict: "approved"
      findings: []
    states:
      reviewed: { terminal: true }
