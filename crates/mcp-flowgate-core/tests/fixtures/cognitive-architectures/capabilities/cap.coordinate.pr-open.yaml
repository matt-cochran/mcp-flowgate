# capabilities/cap.coordinate.pr-open.yaml
#
# Side-effect coordination: open a PR against the declared base ref.
# Shared across add-feature, bugfix, and safe-refactor as the
# terminal "publish" step. The actual GitHub API call lives in the
# underlying MCP connection; this cap shapes the contract.
#
# Per spec §4.1, ideal `coordinate` verb shape is `kind: mcp` AND
# the connection has `external: true`. The runtime's V6 check
# enforces only the `kind: mcp` half today (no `external:` field
# yet — CHANGELOG slot for v0.7).

workflows:
  cap.coordinate.pr-open:
    verb: coordinate
    lifecycle: experimental
    description: >
      Open a PR with the declared title/body against base. Emits the
      created PR URL.
    snippet:
      inputs:
        title: { type: string, required: true }
        body:  { type: string, default: "" }
        base:  { type: string, default: "main" }
      outputs:
        url:        { type: string }
        pr_number:  { type: integer }
    initialState: opened
    initialContext:
      url:       "https://example.invalid/pr/stub"
      pr_number: 0
    states:
      opened: { terminal: true }
