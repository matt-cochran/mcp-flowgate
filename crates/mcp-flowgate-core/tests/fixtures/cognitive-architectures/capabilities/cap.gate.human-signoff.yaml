# capabilities/cap.gate.human-signoff.yaml
#
# HITL approval gate. Used by `flow.add-feature` before implementation
# (operator approves plan), and any orchestrator that needs a human
# checkpoint.
#
# Per spec §4.1, `gate` verb requires at least one initial-state
# transition with `actor: human` OR `purpose: ask`. v0.6 stubs this
# as a terminal initial state plus a self-loop ask transition that
# satisfies V6 without blocking the e2e walk.

workflows:
  cap.gate.human-signoff:
    verb: gate
    lifecycle: experimental
    description: >
      Block until a human approves the supplied artifact. v0.6 stub
      auto-approves; v0.7 wires real HITL via the runtime's
      enable_human_ask injection.
    snippet:
      inputs:
        artifact: { type: object, required: true }
        prompt:   { type: string, default: "Approve?" }
      outputs:
        decision:   { type: string, enum: [approved, rejected] }
        rationale:  { type: string }
    initialState: signed_off
    initialContext:
      decision:  "approved"
      rationale: "v0.6 stub auto-approval"
    states:
      signed_off: { terminal: true }
