# capabilities/cap.research.context-assemble.yaml
#
# Assemble a code-context bundle from a scope description (paths,
# component, search query). Used by `flow.safe-refactor` as the first
# read step before any edit is proposed.

workflows:
  cap.research.context-assemble:
    verb: research
    lifecycle: experimental
    description: >
      Walk symbols, dependencies, and tests touching the declared
      scope; emit a bundle a refactor planner can consume.
    snippet:
      inputs:
        scope_description: { type: object, required: true }
      outputs:
        context: { type: object }
    initialState: assembled
    initialContext:
      context:
        symbols: []
        dependencies: []
        tests: []
    states:
      assembled: { terminal: true }
