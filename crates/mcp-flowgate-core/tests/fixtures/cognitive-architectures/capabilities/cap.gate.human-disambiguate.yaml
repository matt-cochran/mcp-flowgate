# capabilities/cap.gate.human-disambiguate.yaml
#
# HITL disambiguation gate — used when a deterministic classifier is
# uncertain. `flow.triage-issue` invokes this when route-component
# returns `is_ambiguous: true`.

workflows:
  cap.gate.human-disambiguate:
    verb: gate
    lifecycle: experimental
    description: >
      Ask a human to pick between candidate routings / owners /
      component assignments when the classifier is uncertain.
    snippet:
      inputs:
        candidates: { type: array,  required: true }
        prompt:     { type: string, default: "Pick one" }
      outputs:
        chosen:    { type: object }
        rationale: { type: string }
    initialState: disambiguated
    initialContext:
      chosen:
        component:  "platform"
        owner_team: "platform-team"
      rationale: "v0.6 stub default pick"
    states:
      disambiguated: { terminal: true }
