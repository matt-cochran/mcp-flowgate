# capabilities/cap.plan.fix.yaml
#
# Produce a structured fix plan from a localized defect. Used by
# `flow.bugfix-from-error-log` after diagnosis.

workflows:
  cap.plan.fix:
    verb: plan
    lifecycle: experimental
    description: >
      Plan the fix: scope, approach, regression-test additions.
    snippet:
      inputs:
        defect_location: { type: object, required: true }
        repro_steps:     { type: array,  required: true }
      outputs:
        plan: { type: object }
    initialState: planned
    initialContext:
      plan:
        title: "Stub fix plan (cap.plan.fix v0.6)"
        approach: "minimal-bounded"
        scope_paths: []
    states:
      planned: { terminal: true }
