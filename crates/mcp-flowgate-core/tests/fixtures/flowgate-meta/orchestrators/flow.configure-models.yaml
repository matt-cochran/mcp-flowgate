# orchestrators/flow.configure-models.yaml
#
# The guided agents.yaml setup flow. Inventories the operator's
# reachable providers → composes a binding plan → gets approval →
# writes atomically + round-trip-validates → smoke-tests auth.
#
# v0.3 deliverable per the FMECA-vetted plan
# (`/home/mc/.claude/plans/tender-honking-plum.md`):
#   - five caps + this orchestrator
#   - mode=auto for unattended runs; mode=review_plan (default)
#     for HITL approval
#   - per-binding smoke-test surfaces the FailureClass enum, never
#     a silent "all green"

workflows:
  flow.configure-models:
    description: |
      Inventory providers → suggest bindings → approve plan →
      write agents.yaml atomically with round-trip → smoke-test
      auth per binding.

      Inputs let operators run unattended (mode=auto) or guided
      (mode=review_plan, default). The orchestrator branches to
      `failed` on round-trip rejection so a broken agents.yaml
      never replaces a good one.
    inputs:
      providers:
        type: string
        default: "anthropic,openai,google"
      delegates:
        type: array
        default: ["coding-frontier", "reasoning-frontier", "prose-standard"]
      mode:
        type: string
        enum: [auto, review_plan]
        default: review_plan
      target_path:
        type: string
        default: ".flowgate/agents.yaml"
    initialState: inventorying
    states:
      inventorying:
        transitions:
          inventory:
            target: planning
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.research.model-inventory
              use:
                inputs:
                  providers: "$.context.providers"
                outputs:
                  "$.context.inventory":        inventory
                  "$.context.inventory_errors": errors

      planning:
        transitions:
          plan:
            target: gating
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.plan.suggest-bindings
              use:
                inputs:
                  inventory: "$.context.inventory"
                  delegates: "$.context.delegates"
                  errors:    "$.context.inventory_errors"
                outputs:
                  "$.context.plan":        plan
                  "$.context.rationale":   rationale
                  "$.context.tradeoffs":   tradeoffs
                  "$.context.assumptions": assumptions

      gating:
        transitions:
          gate:
            target: gated
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.gate.human-approve-plan
              use:
                inputs:
                  plan:        "$.context.plan"
                  rationale:   "$.context.rationale"
                  tradeoffs:   "$.context.tradeoffs"
                  assumptions: "$.context.assumptions"
                  mode:        "$.context.mode"
                outputs:
                  "$.context.approved":       approved
                  "$.context.plan_final":     plan_final
                  "$.context.gate_rationale": rationale

      gated:
        transitions:
          advance:
            target: writing
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.approved == true"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.approved == false"

      writing:
        transitions:
          write:
            target: written
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.implement.write-agents-config
              use:
                inputs:
                  plan_final:  "$.context.plan_final"
                  target_path: "$.context.target_path"
                outputs:
                  "$.context.written_path":  written_path
                  "$.context.round_trip_ok": round_trip_ok
                  "$.context.validation":    validation

      written:
        transitions:
          advance:
            target: smoking
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.round_trip_ok == true"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.round_trip_ok == false"

      smoking:
        transitions:
          smoke:
            target: done
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.verify.auth-only-smoke-test
              use:
                inputs:
                  agents_config_path: "$.context.written_path"
                outputs:
                  "$.context.smoke_results":    results
                  "$.context.smoke_disclaimer": disclaimer

      done:
        terminal: true

      failed:
        terminal: true
