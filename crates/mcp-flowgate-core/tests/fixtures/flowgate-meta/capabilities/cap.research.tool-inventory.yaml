# capabilities/cap.research.tool-inventory.yaml
#
# Introspect what's reachable from the calling gateway: declared MCP
# connections + their exposed tools, scripts in the library, skills
# in the library, and existing capabilities other orchestrators
# could compose. The output drives every downstream meta-cap.
#
# Operators bring their own tool stack — this is the cap that turns
# "what's loaded" into a typed inventory the planner can reason over.

workflows:
  cap.research.tool-inventory:
    verb: research
    lifecycle: experimental
    description: >
      Survey the live gateway for reachable tools/scripts/skills/caps;
      emit a typed inventory the planner can compose against.
    snippet:
      inputs:
        filter: { type: object, default: {} }
      outputs:
        inventory: { type: object }
    initialState: surveyed
    initialContext:
      inventory:
        mcp_tools: []
        cli_scripts: []
        skills: []
        capabilities: []
        connections: []
    states:
      surveyed: { terminal: true }
