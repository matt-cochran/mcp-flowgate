# capabilities/cap.implement.emit-yaml.yaml
#
# Render the chosen shape into a flowgate.repo/v1-conformant YAML
# document — capability or orchestrator depending on caller. The
# output is a literal YAML string the next state writes to disk and
# checks via `cap.verify.check-config`.
#
# v0.1 stubs the YAML body; v0.2 wires real templating + the
# operator's preferred-script-language preference (SPEC §17.x).

workflows:
  cap.implement.emit-yaml:
    verb: implement
    lifecycle: experimental
    description: >
      Render the chosen shape into a v0.6-conformant YAML body for
      a capability or orchestrator. Output is the YAML text + the
      target path under capabilities/ or orchestrators/.
    snippet:
      inputs:
        chosen:    { type: object, required: true }
        kind:      { type: string, enum: [capability, orchestrator] }
        namespace: { type: string, default: "draft" }
      outputs:
        yaml_text:   { type: string }
        target_path: { type: string }
    initialState: emitted
    initialContext:
      yaml_text: "# stub yaml emit — replace with real generator"
      target_path: "capabilities/cap.stub.draft.yaml"
    states:
      emitted: { terminal: true }
